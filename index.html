<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Game 2</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section id="cover">
  <img src="images/rabbit.png" class="rabbit">
  <div id="dialogue"></div>
  <h1 id="title" class="hidden">English game 2</h1>
  <button id="startBtn" class="hidden" onclick="startGame()">START</button>

  <p>作者：林姵彣 Bonnie<br>學號：414170534</p>
</section>

<section id="game" class="hidden">
  <p>Time: <span id="time">300</span></p>
  <p>Score: <span id="score">0</span></p>

  <div id="questionBox"></div>

  <div class="grid">
    <div class="hole" onclick="hit(0)"></div>
    <div class="hole" onclick="hit(1)"></div>
    <div class="hole" onclick="hit(2)"></div>
    <div class="hole" onclick="hit(3)"></div>
  </div>

  <div id="animation"></div>
</section>

<section id="result" class="hidden">
  <h1>Game Over</h1>
  <p id="finalScore"></p>

  <input id="playerName" placeholder="Name">
  <button onclick="saveScore()">Save</button>

  <ol id="leaderboard"></ol>
</section>

<audio id="dingSound" src="sounds/ding.mp3"></audio>
<audio id="oopsSound" src="sounds/oops.mp3"></audio>

<canvas id="fireworks"></canvas>

<script src="script.js"></script>

</body>
</html>
